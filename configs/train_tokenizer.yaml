defaults:
  - datasets: ffhq
  - tokenizer: vqvae_base
  - _self_

seed: 42
device: cuda
checkpoint_dir: checkpoints/tokenizer

hydra:
  run:
    dir: ${checkpoint_dir}/${now:%Y-%m-%d_%H-%M-%S}

train:
  epochs: 200
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.95]
  grad_clip: 1.0
  amp: true
  eval_every: 1
  save_every: 5

scheduler:
  name: none
  warmup_epochs: 0
  min_lr_ratio: 0.1

trainer:
  recon_weight: 1.0
  vq_weight: 1.0
  loss_type: mse
