defaults:
  - var: var_base
  - tokenizer: vqvae_base
  - datasets: imagenet
  - _self_

# =========================
# 1) Run / Paths
# =========================
seed: 42
device: cuda

checkpoint_dir: checkpoints/var

hydra:
  run:
    dir: ${checkpoint_dir}/${now:%Y-%m-%d_%H-%M-%S}

# =========================
# 2) Training core
# =========================
train:
  epochs: 200
  batch_size: 32
  grad_accum_steps: 1
  eval_batch_size: 32
  num_workers: 8
  pin_memory: true
  drop_last: true

  grad_clip: 2.0
  amp: true

# =========================
# 3) Optim / schedule
# =========================
optim:
  base_lr: 1.0e-4  # effective lr = base_lr * (global_batch_size * grad_accum_steps / 256)
  weight_decay: 0.05
  betas: [0.9, 0.95]

scheduler:
  name: lin0
  warmup_epochs: 4
  warmup_start_ratio: 0.005
  final_lr_ratio: 0.01
  weight_decay_end: 0.05

# =========================
# 4) Eval / ckpt cadence
# =========================
logging:
  eval_every: 1
  save_every: 10
  sample_every: 50
  num_val_samples: 4
  early_stopping_patience: 0
  early_stopping_min_delta: 0.0

# =========================
# 5) Sampling knobs
# =========================
sampling:
  val_cfg_scale: 1.5
  val_temperature: 0.9
  val_top_k: 900
  val_top_p: 0.96
