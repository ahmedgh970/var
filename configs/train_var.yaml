defaults:
  - var: var_base
  - _self_

seed: 42
device: cuda

tokens_root: /data/tii/data/ffhq256_train_val/tokens/multi
checkpoint_dir: checkpoints/var

hydra:
  run:
    dir: ${checkpoint_dir}/${now:%Y-%m-%d_%H-%M-%S}

train:
  epochs: 200
  batch_size: 32
  eval_batch_size: 32
  num_workers: 8
  pin_memory: true
  drop_last: true

  lr: 1.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]
  grad_clip: 1.0
  amp: true
  eval_every: 1
  save_every: 5
  early_stopping_patience: 15
  early_stopping_min_delta: 1.0e-4

scheduler:
  name: cosine
  warmup_epochs: 0
  min_lr_ratio: 0.1
