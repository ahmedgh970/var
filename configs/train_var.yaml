defaults:
  - var: var_base
  - _self_

seed: 42
device: cuda

tokens_root: /path/to/tokenized_dataset_run_dir
checkpoint_dir: checkpoints/var

hydra:
  run:
    dir: ${checkpoint_dir}/${now:%Y-%m-%d_%H-%M-%S}

train:
  epochs: 200
  batch_size: 16
  eval_batch_size: 16
  num_workers: 8
  pin_memory: true
  drop_last: true

  lr: 1.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]
  grad_clip: 1.0
  amp: true
  eval_every: 1
  save_every: 5

scheduler:
  name: none
  warmup_epochs: 0
  min_lr_ratio: 0.1
