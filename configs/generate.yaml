defaults:
  - var: var_base
  - tokenizer: vqvae_base
  - _self_

seed: 42
device: cuda

var_checkpoint_path: checkpoints/var/2026-04-21_11-45-03/last.pt

num_samples: 4
batch_size: 1

cfg_scale: 3.5          # classifier-free guidance scale; set to 1.0 to disable
class_labels: [0,1,134,1000]     # null = cycle 0..num_classes; or explicit list e.g. [0, 1, 7, 207]
temperature: 0.9
top_k: 900
top_p: 0.96
sample_prefix: "sample"
