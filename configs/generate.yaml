defaults:
  - var: var_base
  - tokenizer: vqvae_base
  - _self_

seed: 42
device: cuda:1

var_checkpoint_path: checkpoints/var/2026-04-15_17-56-31/last.pt

use_ema: true

num_samples: 16
batch_size: 8

cfg_scale: 1.5          # classifier-free guidance scale; set to 1.0 to disable
class_labels: null      # null = cycle 0..num_classes; or explicit list e.g. [0, 1, 7, 207]
temperature: 0.9
top_k: 900
top_p: 0.96
sample_prefix: "sample"
